apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - name: listener_http
          address:
            socket_address: { address: 0.0.0.0, port_value: 80 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: tempconv
                          domains: ["*"]
                          cors:
                            allow_origin_string_match:
                              - prefix: "http://"
                              - prefix: "https://"
                            allow_methods: "GET,POST,OPTIONS"
                            allow_headers: "content-type,x-grpc-web,x-user-agent,grpc-timeout,authorization"
                            expose_headers: "grpc-status,grpc-message,grpc-status-details-bin"
                            max_age: "1728000"
                            allow_credentials: false
                          routes:
                            # grpc-web: /<package>.<Service>/<Method>
                            - match: { prefix: "/tempconv.TempConvService/" }
                              route: { cluster: tempconv_backend, timeout: 5s }
                            - match: { prefix: "/tempconv.Health/" }
                              route: { cluster: tempconv_backend, timeout: 5s }
                            # everything else -> frontend static site
                            - match: { prefix: "/" }
                              route: { cluster: tempconv_frontend }
                    http_filters:
                      - name: envoy.filters.http.grpc_web
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: tempconv_backend
          connect_timeout: 0.25s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          http2_protocol_options: {}
          load_assignment:
            cluster_name: tempconv_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: tempconv-backend, port_value: 50051 }

        - name: tempconv_frontend
          connect_timeout: 0.25s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: tempconv_frontend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: tempconv-frontend, port_value: 80 }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.29-latest
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
          ports:
            - containerPort: 80
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config

---
apiVersion: v1
kind: Service
metadata:
  name: envoy
spec:
  type: LoadBalancer
  selector:
    app: envoy
  ports:
    - name: http
      port: 80
      targetPort: 80