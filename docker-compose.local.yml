services:
  backend:
    build:
      context: ./backend
    ports:
      - "50051:50051"

  envoy:
    image: envoyproxy/envoy:v1.29-latest
    depends_on:
      - backend
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/local/envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]