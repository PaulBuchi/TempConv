server {
    listen 80;
    server_name _;

    # Static files are in /usr/share/nginx/html
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 1000;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Specific caching for main.dart.js
    location = /main.dart.js {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for Kubernetes probes
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}